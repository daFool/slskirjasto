<!DOCTYPE html>
<html lang="fi">
	<head>
		<meta charset="utf-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		{{ include ("styles.html") }}
		<title>{{ Kirjaudu }}</title>                
	</head>
	<body class="signin">
			<div class="container">
				<form class="form-signin" name="login" method="POST" action="{{ baseurl }}/login">
					<label for="ktunnus" class="sr-only">{{ kayttajatunnus }}</label>
					<input class="form-control" id="ktunnus" type="text" size="20" maxlength="255" required="true" name="ktunnus" placeholder="{{ kayttajatunnus }}" required autofocus />
					<label for="salasana" class="sr-only">{{ salasana }}</label>
					<input class="form-control" type="password" size="20" maxlength="120" required="true" name="salasana" id="salasana" required placeHolder="{{ salasana }}"/>
					<button class="btn btn-lg btn-primary btn-block" type="submit">{{ Kirjaudu }}</button>
					<a href="{{ localregister }}">{{ rekisteroidy }}</a>	
				</form>
				{% if error %}
				<div class="text-danger">{{ errormsg }}</div>	
				{% endif %}
			</div>
			{{ include("scripts.html") }}
	</body>	
</html>
